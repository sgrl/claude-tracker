name: claudetracker
options:
  bundleIdPrefix: com.sagar
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: "YES"

targets:
  claudetracker:
    type: application
    platform: macOS
    sources:
      - path: Sources/claudetracker
        excludes:
          - "Info.plist"
          - "claudetracker.entitlements"
      - path: Resources
        optional: true
        buildPhase: resources
        excludes:
          - "AppIcon.iconset"
    info:
      path: Sources/claudetracker/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Claude Tracker
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: ""
    entitlements:
      path: Sources/claudetracker/claudetracker.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.sgrl.claude-tracker
        PRODUCT_NAME: claudetracker
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: "NO"

  claudetrackerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/claudetrackerTests
    dependencies:
      - target: claudetracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.sgrl.claude-tracker.tests
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: "YES"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/claudetracker.app/Contents/MacOS/claudetracker"
